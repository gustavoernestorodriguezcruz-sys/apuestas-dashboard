name: Update Dashboard

on:
  schedule:
    - cron: "*/1 * * * *"   # Corre cada minuto
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script.py
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python script.py || exit 1

      - name: Run predict.py
        run: python predict.py || exit 1

      - name: Commit and push dashboard.json
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.json
          if ! git diff --cached --quiet; then
            git commit -m "Update dashboard.json - $(date -u +'%Y-%m-%d %H:%M:%S')"
            git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }} HEAD:${{ github.ref_name }}
          else
            echo "No changes in dashboard.json"
          fi
