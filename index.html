<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mundial 2026 - Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>⚽ Dashboard Mundial 2026</h1>
  </header>

  <!-- Aquí se mostrarán los partidos -->
  <main id="matches"></main>

  <footer>
    <p>Actualizado automáticamente cada hora</p>
  </footer>

  <!-- 👇 El script SIEMPRE va aquí, antes de cerrar el body -->
  <script>
    fetch('dashboard.json')
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById('matches');
        data.forEach(match => {
          const div = document.createElement('div');
          div.className = 'match';
          div.innerHTML = `
            <div class="teams">${match.home} vs ${match.away}</div>
            <div class="date">📅 ${match.fecha}</div>
            <div class="status ${match.estado.toLowerCase()}">Estado: ${match.estado}</div>
            <div class="h2h">
              <strong>Historial:</strong> 
              ${match.home} ${match.h2h.home_wins} - ${match.away} ${match.h2h.away_wins} 
              (${match.h2h.draws} empates, total ${match.h2h.total_matches})
            </div>
            <div class="stats">
              <strong>Goles acumulados:</strong> 
              ${match.home}: ${match.stats.home_goals} | 
              ${match.away}: ${match.stats.away_goals}
            </div>
          `;
          container.appendChild(div);
        });
      });
  </script>
</body>
</html>
