<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mundial 2026 - Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="extras.js" defer></script>
</head>
<body>
  <header>🏆 Dashboard de Apuestas - Mundial 2026</header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="live">En Vivo</button>
    <button class="tab-btn" data-tab="upcoming">Próximos</button>
    <button class="tab-btn" data-tab="finished">Finalizados</button>
  </nav>

  <main id="matches"></main>

  <footer>
    Basado en la <em>Constitución del Tipster</em> | Datos: Football-Data + OddsAPI
  </footer>

  <script>
    fetch('dashboard.json')
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById('matches');
        const tabButtons = document.querySelectorAll('.tab-btn');
        let previousOdds = {};

        function render(matches) {
          container.innerHTML = '';
          matches.forEach(match => {
            const div = document.createElement('div');
            div.className = 'card';

            let oddsChange = '';
            if (previousOdds[match.home + match.away]) {
              const prev = previousOdds[match.home + match.away];
              if (match.odds && match.odds.home_win && prev.home_win) {
                if (match.odds.home_win > prev.home_win) oddsChange = '⬆️';
                else if (match.odds.home_win < prev.home_win) oddsChange = '⬇️';
              }
            }
            previousOdds[match.home + match.away] = match.odds || {};

            div.innerHTML = `
              <h3>${match.home} vs ${match.away}</h3>
              <p>📅 ${match.fecha}</p>
              <p class="status ${match.estado.toLowerCase()}">Estado: ${match.estado}</p>
              <p><strong>Historial:</strong> ${match.home} ${match.h2h.home_wins} - ${match.away} ${match.h2h.away_wins} (${match.h2h.draws} empates)</p>
              <p><strong>Goles acumulados:</strong> ${match.home}: ${match.stats.home_goals} | ${match.away}: ${match.stats.away_goals}</p>
              ${match.prediction ? `
              <div class="prediction">
                <strong>Predicción 1X2:</strong> ${match.prediction.recommendation.toUpperCase()} 
                (Local ${match.prediction.prob_home}, Empate ${match.prediction.prob_draw}, Visitante ${match.prediction.prob_away}) ${oddsChange}
              </div>` : ''}
              ${match.odds && match.odds.over_under ? `
              <div class="markets">
                <strong>Over/Under:</strong><br>
                ${match.odds.over_under.map(o => `${o.name} ${o.line} @ ${o.price}`).join('<br>')}
              </div>` : ''}
              ${match.odds && match.odds.handicap ? `
              <div class="markets">
                <strong>Hándicap:</strong><br>
                ${match.odds.handicap.map(h => `${h.name} (${h.line}) @ ${h.price}`).join('<br>')}
              </div>` : ''}
              ${match.odds && match.odds.bookmakers ? `
              <div class="markets">
                <strong>Comparador de Casas:</strong><br>
                ${match.odds.bookmakers.map(b => `${b.title}: ${b.markets[0].outcomes.map(o => o.name + ' @ ' + o.price).join(', ')}`).join('<br>')}
              </div>` : ''}
              ${match.estado.toLowerCase() === 'inplay' ? `
              <div class="cashout">💡 Cash Out disponible: asegure su ticket si el partido cambia de rumbo.</div>` : ''}
              <canvas id="chart-${match.home}-${match.away}" height="100"></canvas>
            `;
            container.appendChild(div);

            // Renderizar gráfico de probabilidades
            if (match.prediction && match.prediction.prob_home) {
              renderChart(`chart-${match.home}-${match.away}`, match.prediction);
            }
          });
        }

        function filterByTab(tab) {
          let filtered = [];
          if (tab === 'live') filtered = data.filter(m => m.estado.toLowerCase() === 'inplay');
          else if (tab === 'upcoming') filtered = data.filter(m => m.estado.toLowerCase() === 'scheduled');
          else if (tab === 'finished') filtered = data.filter(m => m.estado.toLowerCase() === 'finished');
          render(filtered);
        }

        filterByTab('live');
        tabButtons.forEach(btn => {
          btn.addEventListener('click', () => {
            tabButtons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filterByTab(btn.dataset.tab);
          });
        });
      });
  </script>
</body>
</html>
