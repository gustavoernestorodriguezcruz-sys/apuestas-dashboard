<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mundial 2026 - Partidos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>⚽ Partidos Mundial 2026</h1>
  </header>

  <main id="matches"></main>

  <footer>
    <p>Actualizado automáticamente cada hora</p>
  </footer>

  <script>
    fetch('dashboard.json')
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById('matches');
        data.forEach(match => {
          const div = document.createElement('div');
          div.className = 'match';
          div.innerHTML = `
            <span class="date">${match.fecha}</span>
            <span class="teams">${match.home} vs ${match.away}</span>
            <span class="status ${match.estado.toLowerCase()}">${match.estado}</span>
          `;
          container.appendChild(div);
        });
      });
  </script>
</body>
</html>
