<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Apuestas Mundial 2026</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="extras.js" defer></script>
</head>
<body>
  <header>🏆 Dashboard de Apuestas - Mundial 2026</header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="live">En Vivo</button>
    <button class="tab-btn" data-tab="upcoming">Próximos</button>
    <button class="tab-btn" data-tab="finished">Finalizados</button>
  </nav>

  <main id="matches"></main>

  <footer>
    Basado en la <em>Constitución del Tipster</em> | Datos: Football-Data + OddsAPI + Config.json
  </footer>

  <script>
    let saldo = 0;
    fetch('config.json')
      .then(res => res.json())
      .then(cfg => { saldo = cfg.saldo; });

    fetch('dashboard.json')
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById('matches');
        const tabButtons = document.querySelectorAll('.tab-btn');

        function render(matches) {
          container.innerHTML = '';
          matches.forEach(match => {
            const div = document.createElement('div');
            div.className = 'card';

            // Normalizar clase de estado (minúsculas sin guion)
            const statusClass = match.estado.toLowerCase().replace("_", "");
            const displayStatus = match.estado.toUpperCase();

            div.innerHTML = `
              <h3>${match.home} vs ${match.away}</h3>
              <p>📅 ${match.fecha}</p>
              <p class="status ${statusClass}">Estado: ${displayStatus}</p>
              ${match.prediction && match.prediction.recommendation !== '⚠️ Sin datos' && match.prediction.recommendation !== 'PASS' ? `
              <div class="prediction">
                <strong>Predicción:</strong> ${match.prediction.recommendation.toUpperCase()} 
                (Local ${match.prediction.prob_home}, Empate ${match.prediction.prob_draw}, Visitante ${match.prediction.prob_away})
                <br><small>EV: ${match.prediction.best_ev || 'N/A'}</small>
              </div>` : ''}
              ${saldo > 0 && match.prediction && match.prediction.recommendation !== '⚠️ Sin datos' && match.prediction.recommendation !== 'PASS' ? `
              <div class="cashout">
                💰 Con saldo ${saldo}, ganancia potencial: 
                ${(saldo * (match.prediction.recommendation === 'home' ? match.odds.home_win : 
                            match.prediction.recommendation === 'draw' ? match.odds.draw : 
                            match.odds.away_win)).toFixed(2)}
              </div>` : ''}
              <canvas id="chart-${Math.random()}-${Date.now()}" height="100"></canvas>
            `;
            container.appendChild(div);

            if (match.prediction && match.prediction.prob_home) {
              const canvasId = container.lastChild.querySelector('canvas').id;
              renderChart(canvasId, match.prediction);
            }
          });
        }

        function filterByTab(tab) {
          let filtered = [];
          if (tab === 'live') filtered = data.filter(m => m.estado === 'inplay');
          else if (tab === 'upcoming') filtered = data.filter(m => m.estado === 'scheduled');
          else if (tab === 'finished') filtered = data.filter(m => m.estado === 'finished');
          render(filtered);
        }

        filterByTab('live');
        tabButtons.forEach(btn => {
          btn.addEventListener('click', () => {
            tabButtons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filterByTab(btn.dataset.tab);
          });
        });
      });
  </script>
</body>
</html>
