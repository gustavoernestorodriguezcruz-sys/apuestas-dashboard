<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mundial 2026 - Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    🏆 Dashboard de Apuestas - Mundial 2026
  </header>

  <section id="filters">
    <input type="text" id="searchTeam" placeholder="Buscar equipo...">
    <button id="filterLive">Solo en vivo</button>
  </section>

  <main id="matches"></main>

  <footer>
    Datos: Football-Data + OddsAPI | Predicciones calculadas automáticamente
  </footer>

  <script>
    fetch('dashboard.json')
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById('matches');
        const searchInput = document.getElementById('searchTeam');
        const filterLiveBtn = document.getElementById('filterLive');

        function render(matches) {
          container.innerHTML = '';
          matches.forEach(match => {
            const div = document.createElement('div');
            div.className = 'match';
            div.innerHTML = `
              <div class="teams">${match.home} vs ${match.away}</div>
              <div class="date">📅 ${match.fecha}</div>
              <div class="status ${match.estado.toLowerCase()}">Estado: ${match.estado}</div>
              <div class="h2h">
                <strong>Historial:</strong> 
                ${match.home} ${match.h2h.home_wins} - ${match.away} ${match.h2h.away_wins} 
                (${match.h2h.draws} empates, total ${match.h2h.total_matches})
              </div>
              <div class="stats">
                <strong>Goles acumulados:</strong> 
                ${match.home}: ${match.stats.home_goals} | 
                ${match.away}: ${match.stats.away_goals}
              </div>
              ${match.prediction ? `
              <div class="prediction">
                <strong>Predicción 1X2:</strong> 
                ${match.prediction.recommendation.toUpperCase()} 
                (Local ${match.prediction.prob_home}, 
                Empate ${match.prediction.prob_draw}, 
                Visitante ${match.prediction.prob_away})
              </div>` : ''}

              ${match.odds && match.odds.over_under ? `
              <div class="markets">
                <strong>Over/Under:</strong><br>
                ${match.odds.over_under.map(o => `${o.name} ${o.line} @ ${o.price}`).join('<br>')}
              </div>` : ''}

              ${match.odds && match.odds.handicap ? `
              <div class="markets">
                <strong>Hándicap:</strong><br>
                ${match.odds.handicap.map(h => `${h.name} (${h.line}) @ ${h.price}`).join('<br>')}
              </div>` : ''}
            `;
            container.appendChild(div);
          });
        }

        // Render inicial
        render(data);

        // Filtro por equipo
        searchInput.addEventListener('input', () => {
          const term = searchInput.value.toLowerCase();
          const filtered = data.filter(m =>
            m.home.toLowerCase().includes(term) ||
            m.away.toLowerCase().includes(term)
          );
          render(filtered);
        });

        // Filtro solo en vivo
        filterLiveBtn.addEventListener('click', () => {
          const filtered = data.filter(m => m.estado.toLowerCase() === 'inplay');
          render(filtered);
        });
      });
  </script>
</body>
</html>
