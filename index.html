<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mundial 2026 - Partidos</title>
</head>
<body>
  <h1>Partidos Mundial 2026</h1>
  <div id="matches"></div>

  <script>
    fetch('data.json')
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById('matches');
        data.forEach(match => {
          const div = document.createElement('div');
          div.textContent = `${match.fecha} - ${match.home} vs ${match.away} (${match.estado})`;
          container.appendChild(div);
        });
      });
  </script>
</body>
</html>
